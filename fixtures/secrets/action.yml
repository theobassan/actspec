name: Secrets Demo
description: Shows how to pass secrets to an action via RunInput.secrets.
author: actharness

outputs:
  key-length:
    description: Length of the API key (proves it was accessible without leaking it)
    value: ${{ steps.measure.outputs.key-length }}

runs:
  using: composite
  steps:
    - id: api-call
      uses: actions/http-client@v1
      with:
        authorization: "Bearer ${{ secrets.API_KEY }}"
        url: "https://api.example.com/data"

    - id: measure
      shell: bash
      run: |
        KEY="${{ secrets.API_KEY }}"
        echo "key-length=${#KEY}" >> "$GITHUB_OUTPUT"
