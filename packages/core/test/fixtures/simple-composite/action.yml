name: Simple Composite Action
description: A simple composite action for testing

inputs:
  name:
    description: The name to greet
    required: true
  greeting:
    description: The greeting word
    default: Hello

outputs:
  message:
    description: The greeting message
    value: ${{ steps.greet.outputs.message }}

runs:
  using: composite
  steps:
    - id: greet
      name: Greet
      run: echo "::set-output name=message::${{ inputs.greeting }}, ${{ inputs.name }}!"
      shell: bash
